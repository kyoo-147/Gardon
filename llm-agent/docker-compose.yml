version: '3.9'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ollama_data:/app/data
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - nginxproxymanager_default

volumes:
  ollama_models:
  ollama_data:

networks:
  nginxproxymanager_default:
    external: true
